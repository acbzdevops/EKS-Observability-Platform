name: Docker Build Test

on: [push]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Docker Image
* run: docker build -t my-test-image:latest .

      - name: Run Docker Container
        run: docker run my-test-image:latest
